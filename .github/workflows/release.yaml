name: CI

on:
  push:
    branches: ["main"]
    tags:
      - 'v*'
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitz-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: gitz-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitz-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitz-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/gitz ${{ matrix.artifact }}

      - name: Compute SHA256
        run: shasum -a 256 ${{ matrix.artifact }} | awk '{print $1}' > ${{ matrix.artifact }}.sha256

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload SHA256
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}.sha256
          path: ${{ matrix.artifact }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gitz-*
          generate_release_notes: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Read SHA256 values
        id: shas
        run: |
          echo "linux_amd64=$(cat gitz-linux-amd64.sha256)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(cat gitz-linux-arm64.sha256)" >> $GITHUB_OUTPUT
          echo "macos_amd64=$(cat gitz-macos-amd64.sha256)" >> $GITHUB_OUTPUT
          echo "macos_arm64=$(cat gitz-macos-arm64.sha256)" >> $GITHUB_OUTPUT

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: pahanini/homebrew-gitz
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-gitz

      - name: Update formula
        run: |
          TAG=${{ github.ref_name }}
          sed -i "s|VERSION_PLACEHOLDER|${TAG}|g"                              homebrew-gitz/Formula/gitz.rb
          sed -i "s|SHA256_LINUX_AMD64|${{ steps.shas.outputs.linux_amd64 }}|" homebrew-gitz/Formula/gitz.rb
          sed -i "s|SHA256_LINUX_ARM64|${{ steps.shas.outputs.linux_arm64 }}|" homebrew-gitz/Formula/gitz.rb
          sed -i "s|SHA256_MACOS_AMD64|${{ steps.shas.outputs.macos_amd64 }}|" homebrew-gitz/Formula/gitz.rb
          sed -i "s|SHA256_MACOS_ARM64|${{ steps.shas.outputs.macos_arm64 }}|" homebrew-gitz/Formula/gitz.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitz.rb
          git commit -m "chore: update gitz to ${{ github.ref_name }}"
          git push